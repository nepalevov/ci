name: Calculate Version

description: Calculate semver-format version based on current branch name and existing tags in git repository

inputs:
  promote:
    description: When "true", skips RC increment and produces stable X.Y.Z tag instead. Works only on `release-*` branches
    default: "false"

outputs:
  current-version:
    description: Current tag baseline for version calculation
    value: ${{ steps.calculate-version.outputs.current-version }}
  next-version:
    description: Next computed version
    value: ${{ steps.calculate-version.outputs.next-version }}
  next-version-without-hyphens:
    description: Next computed version without hyphens (e.g. `0.1.0rc` instead of `0.1.0-rc`), for non-semver consumers (e.g. Python PEP 440)
    value: ${{ steps.calculate-version.outputs.next-version-without-hyphens }}
  latest-stable-tag:
    description: Semantically latest stable (`X.Y.Z`, ignores `X.Y.Z-rc`) git tag in the repository
    value: ${{ steps.calculate-version.outputs.latest-stable-tag }}
  is-latest:
    description: Identifies if `next-version` is semantically greater than `latest-stable-tag`
    value: ${{ steps.calculate-version.outputs.is-latest }}
  is-release-candidate:
    description: The `next-version` is a release candidate
    value: ${{ steps.calculate-version.outputs.is-release-candidate }}
  is-release:
    description: The `next-version` is a stable release
    value: ${{ steps.calculate-version.outputs.is-release }}
  release-line:
    description: X.Y part of the release branch, e.g. `1.0` for `release-1.0`. Empty for other branches
    value: ${{ steps.calculate-version.outputs.release-line }}
  changelog-mode:
    description: Changelog diff strategy - whether to use full branch history (`merge-base`) or tag-to-tag diff (`tag`)
    value: ${{ steps.calculate-version.outputs.changelog-mode }}

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Calculate Version
      id: calculate-version
      shell: bash
      run: |
        #!/bin/bash
        # set -x

        function version { echo "$@" | awk -F. '{ printf("%d%03d%03d\n", $1,$2,$3); }'; }

        function bump_version {
          local VERSION
          IFS='.' read -r -a VERSION <<<"${1}"
          local BRANCH_NAME="$2"

          # Split the version string into Major, Minor and Patch numbers
          local MAJOR=${VERSION[0]:-0}
          local MINOR=${VERSION[1]:-0}
          local PATCH=${VERSION[2]:-0}

          local PRE_RELEASE=""

          # Increment the version number
          if [[ "$BRANCH_NAME" == "development" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            PRE_RELEASE="-rc.0"
          elif [[ "$BRANCH_NAME" =~ ^release- ]]; then
            PATCH=$((PATCH + 1))
          fi

          # Build the new version string
          echo "${MAJOR}.${MINOR}.${PATCH}${PRE_RELEASE}"
        }

        CURRENT_BRANCH=$(git symbolic-ref -q HEAD || true)
        CURRENT_BRANCH=${CURRENT_BRANCH##refs/heads/}
        CURRENT_BRANCH=${CURRENT_BRANCH:-HEAD}

        PROMOTE="${INPUT_PROMOTE}"
        IS_RELEASE_CANDIDATE="false"
        IS_RELEASE="false"
        IS_LATEST="false"
        CHANGELOG_MODE="tag"

        git fetch --tags

        # Stable-only latest tag (ignores RC tags)
        LATEST_STABLE_TAG=$(git tag | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -1 || true)

        if [[ "${CURRENT_BRANCH}" == "development" ]]; then
          CURRENT_VERSION="${LATEST_STABLE_TAG}"
          NEXT_VERSION=$(bump_version "${CURRENT_VERSION}" "${CURRENT_BRANCH}")

        elif [[ "${CURRENT_BRANCH}" =~ ^release- ]]; then
          RELEASE_LINE="${CURRENT_BRANCH##release-}" # e.g. "1.0"
          STABLE_TAG=$(git tag | grep -E "^${RELEASE_LINE}\.[0-9]+$" | sort -V | tail -1 || true)

          if [[ -n "${STABLE_TAG}" ]]; then
            # Stable tag found = at least one release on this release line --> bump patch version
            CURRENT_VERSION="${STABLE_TAG}"
            NEXT_VERSION=$(bump_version "${CURRENT_VERSION}" "${CURRENT_BRANCH}")
            IS_RELEASE="true"
            if [ "$(version "${NEXT_VERSION}")" -gt "$(version "${LATEST_STABLE_TAG}")" ]; then
              IS_LATEST="true"
            fi

          elif [[ "${PROMOTE}" == "true" ]]; then
            # No stable tag found + promote trigger passed --> produce first stable release
            CURRENT_VERSION=$(git tag | grep -E "^${RELEASE_LINE}\.0-rc\.[0-9]+$" | sort -V | tail -1 || true)
            NEXT_VERSION="${RELEASE_LINE}.0"
            CHANGELOG_MODE="merge-base"
            IS_RELEASE="true"
            if [ "$(version "${NEXT_VERSION}")" -gt "$(version "${LATEST_STABLE_TAG}")" ]; then
              IS_LATEST="true"
            fi

          else
            # No stable tag found, no promote trigger --> bump RC version
            IS_RELEASE_CANDIDATE="true"
            LATEST_RC=$(git tag | grep -E "^${RELEASE_LINE}\.0-rc\.[0-9]+$" | sort -V | tail -1 || true)

            if [[ -n "${LATEST_RC}" ]]; then
              RC_N=$(echo "${LATEST_RC}" | sed "s/^.*-rc\.//")
              CURRENT_VERSION="${LATEST_RC}"
              NEXT_VERSION="${RELEASE_LINE}.0-rc.$((RC_N + 1))"

            else
              CURRENT_VERSION=""
              NEXT_VERSION="${RELEASE_LINE}.0-rc.0"
            fi
          fi

        else
          echo "::error::Unsupported branch name '${CURRENT_BRANCH}'. Only 'development' and 'release-X.Y' branches are supported"
          exit 2
        fi

        # Sanitize next version for non-semver consumers (e.g. Python PEP 440) by:
        # 1. Remove a dot between `-rc` and the RC number
        # 2. Remove all hyphens
        # e.g. 1.0.0 --> 1.0.0, 1.0.0-rc.1 --> 1.0.0rc1
        NEXT_VERSION_WITHOUT_HYPHENS=$(echo "${NEXT_VERSION}" |
          sed 's/-rc\./rc/g' |
          sed 's/-//g')

        # Outputs to stdout and job summary
        OUTPUTS_SUMMARY=$(
          cat <<EOF
        | Parameter                    | Value                         |
        | ---------------------------- | ----------------------------- |
        | current-version              | $CURRENT_VERSION              |
        | next-version                 | $NEXT_VERSION                 |
        | next-version-without-hyphens | $NEXT_VERSION_WITHOUT_HYPHENS |
        | latest-stable-tag            | $LATEST_STABLE_TAG            |
        | is-latest                    | $IS_LATEST                    |
        | changelog-mode               | $CHANGELOG_MODE               |
        | release-line                 | $RELEASE_LINE                 |
        | is-release-candidate         | $IS_RELEASE_CANDIDATE         |
        | is-release                   | $IS_RELEASE                   |
        EOF
        )
        echo "$OUTPUTS_SUMMARY"
        echo "$OUTPUTS_SUMMARY" >>"$GITHUB_STEP_SUMMARY"

        # Outputs
        echo "current-version=${CURRENT_VERSION}" >>$GITHUB_OUTPUT
        echo "next-version=${NEXT_VERSION}" >>$GITHUB_OUTPUT
        echo "next-version-without-hyphens=${NEXT_VERSION_WITHOUT_HYPHENS}" >>$GITHUB_OUTPUT
        echo "latest-stable-tag=${LATEST_STABLE_TAG}" >>$GITHUB_OUTPUT
        echo "is-latest=${IS_LATEST}" >>$GITHUB_OUTPUT
        echo "changelog-mode=${CHANGELOG_MODE}" >>$GITHUB_OUTPUT
        echo "release-line=${RELEASE_LINE:-}" >>$GITHUB_OUTPUT
        echo "is-release-candidate=${IS_RELEASE_CANDIDATE}" >>$GITHUB_OUTPUT
        echo "is-release=${IS_RELEASE}" >>$GITHUB_OUTPUT
      env:
        INPUT_PROMOTE: ${{ inputs.promote }}
